<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app_title">Proyecto Nexus</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.2/reveal.min.css">
  <!-- Utilizamos el tema black de reveal, pero nuestro css ajustará el look and feel al dark space con glassmorphism -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.2/theme/black.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Marca de agua persistente -->
  <img src="assets/logo-icon2.jpg" alt="Honey Whale" class="logo-watermark">

  <!-- Floating Language Switcher -->
  <div class="floating-lang-switcher animate-fade-in-up">
    <a href="#" data-set-lang="zh">ZH</a>
    <a href="#" data-set-lang="es">ES</a>
    <a href="#" data-set-lang="en">EN</a>
  </div>

  <div class="reveal">
    <div class="slides">
      
      <!-- Diapositiva 1: La Agenda -->
      <section>
        <div class="glass-panel animate-fade-in-up">
          <h2 data-i18n="slide1_title" style="margin-bottom: 0;">La Agenda</h2>
          <div class="highlight-bar"></div>
          
          <div class="agenda-list">
            <div class="agenda-item" data-i18n="slide1_item1">1. Introducción y Visión General</div>
            <div class="agenda-item" data-i18n="slide1_item2">2. Análisis del Mercado</div>
            <div class="agenda-item" data-i18n="slide1_item3">3. Estrategia Operativa</div>
            <div class="agenda-item" data-i18n="slide1_item4">4. Proyecciones Financieras</div>
          </div>
        </div>
      </section>

      <!-- Diapositiva 2: El Contexto y La Estrategia -->
      <section>
        <div class="glass-panel animate-fade-in-up">
          <h2 data-i18n="slide2_title" style="margin-bottom: 0;">El Contexto y La Estrategia</h2>
          <div class="highlight-bar"></div>
          
          <div class="strategy-quote">
            <p data-i18n="slide2_text">Cargando contexto...</p>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.2/reveal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.2/plugin/notes/notes.min.js"></script>
  
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
